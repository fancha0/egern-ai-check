name: "数据中心 DCH 检测"
description: "检测本地与落地 IP、AI/流媒体解锁和出口风险"
author: "fancha0"
homepage: "https://github.com/fancha0/egern-mokuai"
icon: "location.magnifyingglass"

env_schema:
  POLICY:
    name: "检测策略（可选）"
    description: "填写策略组或节点名称；留空时遵循现有分流规则"
    default_value: ""
  REFRESH_INTERVAL:
    name: "刷新间隔"
    description: "小组件自动重新检测的间隔，单位为秒"
    default_value: "900"
    options:
      - "300"
      - "900"
      - "1800"
      - "3600"
  REQUEST_TIMEOUT:
    name: "请求超时"
    description: "单个检测请求的超时时间，单位为毫秒"
    default_value: "8000"
    options:
      - "5000"
      - "8000"
      - "12000"
  IP_API_ENDPOINT:
    name: "IP/高级接口（可选）"
    description: "DCH 面板已内置检测源，通常留空"
    default_value: ""
  IP_API_TOKEN:
    name: "IPinfo Token（可选）"
    description: "DCH 面板不需要填写；保留该项仅用于兼容旧配置"
    default_value: ""
  SHOW_ERROR_DETAIL:
    name: "显示错误详情"
    description: "检测失败时在小组件中显示接口和错误摘要，方便排查"
    default_value: "true"
    options:
      - "true"
      - "false"
  NOTIFY_ON_REFRESH:
    name: "刷新时通知"
    description: "开启后每次小组件刷新都会弹出 IP 信息概览；默认关闭"
    default_value: "false"
    options:
      - "false"
      - "true"

scriptings:
  - generic:
      name: "ip-info-widget"
      script_url: "https://raw.githubusercontent.com/fancha0/egern-mokuai/main/Egern/ip-info.js"
      update_interval: 86400
      timeout: 20

widgets:
  - name: "数据中心 DCH"
    script_name: "ip-info-widget"
